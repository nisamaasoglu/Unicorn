; Unicorn rover - PlatformIO project
;
; Two environments:
;   esp32   the firmware itself
;   native  the mission logic in lib/unicorn_core, compiled and tested on a PC
;
; License: MIT

[env:fm-devkit]
platform = espressif32
board = fm-devkit
framework = arduino
monitor_speed = 115200

; WiFi.h and WebServer.h ship with the Arduino ESP32 core, so there is nothing to
; pull in. Declaring libraries a firmware does not use costs build time and tells
; the next reader the wrong thing about the design, so this list stays empty.
lib_deps =

[env:native]
platform = native
test_framework = custom
build_flags = -std=c++11 -Wall -Wextra
